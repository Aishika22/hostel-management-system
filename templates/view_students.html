<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Students</h2>

<form method="GET">
<input name="search" placeholder="Search">
<button class="btn btn-primary btn-sm">Search</button>
</form>

<br>

<a href="/export" class="btn btn-success btn-sm">Export CSV</a>
<a href="/rooms" class="btn btn-warning btn-sm">Room Status</a>

<table class="table mt-3">
<tr>
<th>ID</th><th>Name</th><th>Room</th><th>Fee</th><th>Status</th><th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>
<td>{{ s[4] }}</td>
<td>
<a href="/edit/{{ s[0] }}" class="btn btn-info btn-sm">Edit</a>
<a href="/delete/{{ s[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
