<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Edit</h2>

<form method="POST">
<input class="form-control mb-2" name="name" value="{{ student[1] }}">
<input class="form-control mb-2" name="fee" value="{{ student[3] }}">

<select name="status" class="form-control mb-2">
<option {% if student[4]=='Paid' %}selected{% endif %}>Paid</option>
<option {% if student[4]=='Pending' %}selected{% endif %}>Pending</option>
</select>

<button class="btn btn-primary">Update</button>
</form>

</body>
</html>
